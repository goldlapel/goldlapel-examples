services:
  primary:
    image: postgres:16
    environment:
      POSTGRES_USER: gl
      POSTGRES_PASSWORD: gl
      POSTGRES_DB: todos
    command: >
      postgres
        -c wal_level=replica
        -c max_wal_senders=2
        -c hot_standby=on
        -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "5432:5432"
    volumes:
      - primary_data:/var/lib/postgresql/data
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf

  replica:
    image: postgres:16
    environment:
      PGUSER: gl
      PGPASSWORD: gl
    ports:
      - "5433:5432"
    depends_on:
      - primary
    volumes:
      - ./init-replica.sh:/init-replica.sh
    entrypoint: ["/bin/bash", "/init-replica.sh"]

volumes:
  primary_data:
