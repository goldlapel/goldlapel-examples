services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gl
      POSTGRES_PASSWORD: gl
      POSTGRES_DB: todos
    volumes:
      - pgdata:/var/lib/postgresql/data

  goldlapel:
    image: goldlapel/goldlapel
    environment:
      GOLDLAPEL_UPSTREAM: postgres://gl:gl@postgres:5432/todos
      POSTGRES_USER: gl
      POSTGRES_PASSWORD: gl
      POSTGRES_DB: todos
    ports:
      - "7932:7932"
      - "7933:7933"
    depends_on:
      - postgres

volumes:
  pgdata:
